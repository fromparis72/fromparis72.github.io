<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes liens — Philippe</title>
  <meta name="description" content="Tous mes sites au même endroit." />

  <!-- ============================================= -->
  <!--  PERSONNALISE ICI : titre, sous-titre, liens  -->
  <!-- ============================================= -->

  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e5e5e0;
      --hover: #f0f0ec;
      --accent: #1a1a1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 64px 20px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 600;
      margin: 0 auto 20px;
      letter-spacing: 1px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .tagline {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 36px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    a.link {
      display: block;
      background: #ffffff;
      border: 1px solid #e6e6e1;
      border-radius: 16px;
      padding: 20px 22px;
      text-decoration: none;
      text-align: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }
    a.link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(0,0,0,0.08);
      border-color: #d4d4cd;
    }
    a.link img.logo {
      display: block;
      margin: 0 auto;
      max-width: 84%;
      max-height: 62px;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    a.link .sub {
      display: block;
      margin-top: 12px;
      font-size: 12.5px;
      color: #8a8a8a;
      letter-spacing: 0.02em;
    }
    footer {
      margin-top: 40px;
      font-size: 13px;
      color: var(--muted);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101010;
        --card: #1b1b1b;
        --text: #f2f2f2;
        --muted: #9a9a9a;
        --border: #2c2c2c;
        --hover: #242424;
        --accent: #f2f2f2;
      }
      .avatar { color: #101010; }
    }
  </style>
</head>
<body>
  <main class="container">
    <!-- Initiales ou remplace par une image : <img src="photo.jpg" class="avatar"> -->
    <div class="avatar">P</div>

    <h1>Philippe</h1>
    <p class="tagline">Tous mes sites au même endroit</p>

    <nav class="links">
      <!-- ================================================= -->
      <!--  Pour éditer : change l'URL (href), le titre et la  -->
      <!--  ligne <span class="sub"> sous chaque lien.         -->
      <!-- ================================================= -->

      <a class="link" href="https://www.eyeshot.fr" target="_blank" rel="noopener">
        <img class="logo" src="eyeshot.png" alt="Eyeshot" loading="lazy">
        <span class="sub">eyeshot.fr</span>
      </a>

      <a class="link" href="https://www.b2bvenues.com" target="_blank" rel="noopener">
        <img class="logo" src="b2bvenues.png" alt="B2B Venues" loading="lazy">
        <span class="sub">b2bvenues.com</span>
      </a>

      <a class="link" href="https://www.stay-with-bailey.com" target="_blank" rel="noopener">
        <img class="logo" src="staywithbailey.png" alt="Stay with Bailey" loading="lazy">
        <span class="sub">stay-with-bailey.com</span>
      </a>

      <a class="link" href="https://www.decryptage-tech.com" target="_blank" rel="noopener">
        <img class="logo" src="decryptage-tech.png" alt="Décryptage Tech" loading="lazy">
        <span class="sub">decryptage-tech.com</span>
      </a>

      <a class="link" href="https://www.domatch.fr" target="_blank" rel="noopener">
        <img class="logo" src="domatch.png" alt="Domatch" loading="lazy">
        <span class="sub">domatch.fr</span>
      </a>

      <a class="link" href="https://www.alerte-canicule.com" target="_blank" rel="noopener">
        <img class="logo" src="alerte-canicule.png" alt="Alerte Canicule" loading="lazy">
        <span class="sub">alerte-canicule.com</span>
      </a>

      <a class="link" href="https://www.lechienvoyageur.com" target="_blank" rel="noopener">
        <img class="logo" src="lechienvoyageur.png" alt="Le Chien Voyageur" loading="lazy">
        <span class="sub">lechienvoyageur.com</span>
      </a>

      <a class="link" href="https://www.mydogcanfly.com" target="_blank" rel="noopener">
        <img class="logo" src="mydogcanfly.png" alt="My Dog Can Fly" loading="lazy">
        <span class="sub">mydogcanfly.com</span>
      </a>
    </nav>

    <footer>© 2026 Philippe</footer>
  </main>
</body>
</html>
