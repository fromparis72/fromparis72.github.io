<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes liens — Philippe</title>
  <meta name="description" content="Tous mes sites au même endroit." />

  <!-- ============================================= -->
  <!--  PERSONNALISE ICI : titre, sous-titre, liens  -->
  <!-- ============================================= -->

  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e5e5e0;
      --hover: #f0f0ec;
      --accent: #1a1a1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 64px 20px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 600;
      margin: 0 auto 20px;
      letter-spacing: 1px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .tagline {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 36px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    a.link {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      text-decoration: none;
      color: var(--text);
      font-size: 16px;
      font-weight: 500;
      text-align: left;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }
    a.link:hover {
      background: var(--hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }
    a.link .logo-wrap {
      width: 46px;
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    a.link img.favicon {
      max-width: 46px;
      max-height: 32px;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 4px;
    }
    a.link .label { display: flex; flex-direction: column; }
    a.link .sub {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 2px;
    }
    footer {
      margin-top: 40px;
      font-size: 13px;
      color: var(--muted);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101010;
        --card: #1b1b1b;
        --text: #f2f2f2;
        --muted: #9a9a9a;
        --border: #2c2c2c;
        --hover: #242424;
        --accent: #f2f2f2;
      }
      .avatar { color: #101010; }
    }
  </style>
</head>
<body>
  <main class="container">
    <!-- Initiales ou remplace par une image : <img src="photo.jpg" class="avatar"> -->
    <div class="avatar">P</div>

    <h1>Philippe</h1>
    <p class="tagline">Tous mes sites au même endroit</p>

    <nav class="links">
      <!-- ================================================= -->
      <!--  Pour éditer : change l'URL (href), le titre et la  -->
      <!--  ligne <span class="sub"> sous chaque lien.         -->
      <!-- ================================================= -->

      <a class="link" href="https://www.eyeshot.fr" target="_blank" rel="noopener">
        <span class="logo-wrap"><img class="favicon" src="https://www.eyeshot.fr/assets/images/logo-e-100x101.png" alt="Eyeshot" loading="lazy"></span>
        <span class="label">Eyeshot<span class="sub">eyeshot.fr</span></span>
      </a>

      <a class="link" href="https://www.b2bvenues.com" target="_blank" rel="noopener">
        <span class="logo-wrap"><img class="favicon" src="https://www.b2bvenues.com/assets/images/logo.png" alt="B2B Venues" loading="lazy"></span>
        <span class="label">B2B Venues<span class="sub">b2bvenues.com</span></span>
      </a>

      <a class="link" href="https://www.stay-with-bailey.com" target="_blank" rel="noopener">
        <span class="logo-wrap"><img class="favicon" src="https://www.stay-with-bailey.com/images/logo_bailey.jpg" alt="Stay with Bailey" loading="lazy"></span>
        <span class="label">Stay with Bailey<span class="sub">stay-with-bailey.com</span></span>
      </a>

      <a class="link" href="https://www.decryptage-tech.com" target="_blank" rel="noopener">
        <span class="logo-wrap"><img class="favicon" src="https://decryptage-tech.com/content/images/2026/06/logo-final-decryptage-lite.png" alt="Décryptage Tech" loading="lazy"></span>
        <span class="label">Décryptage Tech<span class="sub">decryptage-tech.com</span></span>
      </a>

      <a class="link" href="https://www.domatch.fr" target="_blank" rel="noopener">
        <span class="logo-wrap"><img class="favicon" src="https://domatch.fr/logo.png" alt="Domatch" loading="lazy"></span>
        <span class="label">Domatch<span class="sub">domatch.fr</span></span>
      </a>

      <a class="link" href="https://www.alerte-canicule.com" target="_blank" rel="noopener">
        <span class="logo-wrap"><img class="favicon" src="https://alerte-canicule.com/favicon.svg" alt="Alerte Canicule" loading="lazy"></span>
        <span class="label">Alerte Canicule<span class="sub">alerte-canicule.com</span></span>
      </a>

      <a class="link" href="https://www.lechienvoyageur.com" target="_blank" rel="noopener">
        <span class="logo-wrap"><img class="favicon" src="https://lechienvoyageur.com/images/lechienvoyageur_slogan_services.png" alt="Le Chien Voyageur" loading="lazy"></span>
        <span class="label">Le Chien Voyageur<span class="sub">lechienvoyageur.com</span></span>
      </a>

      <a class="link" href="https://www.mydogcanfly.com" target="_blank" rel="noopener">
        <span class="logo-wrap"><img class="favicon" src="https://mydogcanfly.com/images/apple-touch-icon.png" alt="My Dog Can Fly" loading="lazy"></span>
        <span class="label">My Dog Can Fly<span class="sub">mydogcanfly.com</span></span>
      </a>
    </nav>

    <footer>© 2026 Philippe</footer>
  </main>
</body>
</html>
